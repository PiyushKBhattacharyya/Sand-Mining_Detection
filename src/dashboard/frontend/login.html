<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Login | Brahmaputra Surveillance</title>
    <!-- Google Fonts: Inter for clean, professional typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.65);
            --border-color: rgba(255, 255, 255, 0.05);
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --error-red: #f87171;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.03) 0%, transparent 60%),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.02) 0%, transparent 60%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Glassmorphism Card Container */
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
            transform: translateY(12px);
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Portal Header */
        .header-logo {
            text-align: center;
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-logo h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .header-logo p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #d1d5db;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            color: #4b5563;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background: rgba(10, 15, 25, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.15);
            background: rgba(10, 15, 25, 0.85);
        }

        /* Action Buttons */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--accent-green);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: var(--accent-green-hover);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.25);
        }

        .btn-submit:active {
            transform: translateY(0.5px);
        }

        /* Error Notification Alert */
        .alert-error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: var(--error-red);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            animation: shakeAlert 0.4s ease-in-out;
        }

        /* Footer info */
        .footer-note {
            text-align: center;
            margin-top: 28px;
            font-size: 11px;
            color: #4b5563;
        }

        /* Animations */
        @keyframes slideUpFade {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes shakeAlert {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }

        /* Custom spinner */
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Link buttons for toggling forms */
        .toggle-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: var(--accent-green);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .toggle-link:hover {
            color: var(--accent-green-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header-logo">
            <!-- Sleek Minimalist River/GIS Layer Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px;">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            <h1>River Surveillance</h1>
            <p>Operator Login Portal</p>
        </div>

        <div id="error-alert" class="alert-error">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span id="error-text">Invalid credentials. Try again.</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </span>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required autocomplete="off">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </span>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <span id="btn-text">Sign In</span>
                <div id="btn-spinner" class="spinner"></div>
            </button>
            
            <a id="go-to-register" class="toggle-link">Don't have an account? Sign Up</a>
        </form>

        <form id="register-form" style="display: none;">
            <div class="form-group">
                <label for="reg-username">Username</label>
                <div class="input-wrapper">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </span>
                    <input type="text" id="reg-username" class="form-control" placeholder="Choose a username" required autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label for="reg-email">Email Address</label>
                <div class="input-wrapper">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    </span>
                    <input type="email" id="reg-email" class="form-control" placeholder="Enter authorized email (.gov, .edu)" required autocomplete="off">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="reg-password">Password</label>
                <div class="input-wrapper">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </span>
                    <input type="password" id="reg-password" class="form-control" placeholder="Choose a strong password" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <span id="btn-reg-text">Register Account</span>
                <div id="btn-reg-spinner" class="spinner"></div>
            </button>
            
            <a id="go-to-login" class="toggle-link">Already have an account? Sign In</a>
        </form>

        <div class="footer-note">
            Authorized Personnel Only
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const regUsernameInput = document.getElementById('reg-username');
        const regEmailInput = document.getElementById('reg-email');
        const regPasswordInput = document.getElementById('reg-password');
        const errorAlert = document.getElementById('error-alert');
        const errorText = document.getElementById('error-text');
        
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const btnRegText = document.getElementById('btn-reg-text');
        const btnRegSpinner = document.getElementById('btn-reg-spinner');

        const goToRegister = document.getElementById('go-to-register');
        const goToLogin = document.getElementById('go-to-login');
        const portalSubtitle = document.querySelector('.header-logo p');

        // Toggle to Register Form
        goToRegister.addEventListener('click', () => {
            errorAlert.style.display = 'none';
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            portalSubtitle.textContent = 'Create Operator Account';
        });

        // Toggle back to Login Form
        goToLogin.addEventListener('click', () => {
            errorAlert.style.display = 'none';
            registerForm.style.display = 'none';
            loginForm.style.display = 'block';
            portalSubtitle.textContent = 'Operator Login Portal';
        });

        const BASE_PATH = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);

        // Handle Login Submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.style.display = 'none';

            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            try {
                const response = await fetch(`${BASE_PATH}api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Authentication failed');
                }

                window.location.href = BASE_PATH;

            } catch (err) {
                btnSpinner.style.display = 'none';
                btnText.style.display = 'block';

                errorText.textContent = err.message;
                errorAlert.style.display = 'flex';
                errorAlert.style.animation = 'none';
                void errorAlert.offsetWidth;
                errorAlert.style.animation = 'shakeAlert 0.4s ease-in-out';
            }
        });

        // Handle Registration Submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.style.display = 'none';

            btnRegText.style.display = 'none';
            btnRegSpinner.style.display = 'block';

            const username = regUsernameInput.value.trim();
            const email = regEmailInput.value.trim();
            const password = regPasswordInput.value;

            try {
                const response = await fetch(`${BASE_PATH}api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Registration failed');
                }

                // Redirect to dashboard on successful registration (immediately logged in)
                window.location.href = BASE_PATH;

            } catch (err) {
                btnRegSpinner.style.display = 'none';
                btnRegText.style.display = 'block';

                errorText.textContent = err.message;
                errorAlert.style.display = 'flex';
                errorAlert.style.animation = 'none';
                void errorAlert.offsetWidth;
                errorAlert.style.animation = 'shakeAlert 0.4s ease-in-out';
            }
        });
    </script>
</body>
</html>
